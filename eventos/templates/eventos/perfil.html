<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil - Uninassau</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Configurações da Conta</span>
            <a href="{% url 'lista_eventos' %}" class="btn btn-outline-light btn-sm">Voltar ao Início</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card shadow border-0">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="mb-0">Meus Dados Cadastrais</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small mb-4">Atualize seu nome completo. Ele será utilizado na emissão dos certificados.</p>
                        
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <hr>
                            <div class="text-end mt-3">
                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
