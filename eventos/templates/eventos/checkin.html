<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Check-in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Módulo de Portaria</span>
            <a href="{% url 'lista_eventos' %}" class="btn btn-outline-light btn-sm">Sair do Modo Portaria</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-start" role="alert">
                            <strong>{{ message }}</strong>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card shadow mt-4">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">Câmera da Portaria</h4>
                    </div>
                    <div class="card-body">
                        
                        <div id="reader" width="100%" class="mb-3"></div>
                        
                        <hr>
                        <p class="text-muted small mb-2">Ou insira o código manualmente (Leitor USB):</p>
                        
                        <form id="checkin_form" method="POST" action="{% url 'validar_checkin' %}">
                            {% csrf_token %}
                            <div class="input-group">
                                <input type="text" id="ticket_hash_input" name="ticket_hash" class="form-control text-center" placeholder="Aguardando código..." autofocus autocomplete="off" required>
                                <button type="submit" class="btn btn-primary">Validar</button>
                            </div>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função ativada quando a câmera acha um QR Code válido
        function onScanSuccess(decodedText, decodedResult) {
            // 1. Para o scanner para não ler duas vezes seguidas
            html5QrcodeScanner.clear();
            
            // 2. Joga o texto lido no campo de input do formulário
            document.getElementById('ticket_hash_input').value = decodedText;
            
            // 3. Aperta o botão de enviar automaticamente
            document.getElementById('checkin_form').submit();
        }

        // Função caso a leitura falhe (ignoramos para ele continuar tentando)
        function onScanFailure(error) {
            // console.warn(`Erro na leitura = ${error}`);
        }

        // Configuração da câmera (quadrado de leitura)
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: {width: 250, height: 250} },
            /* verbose= */ false);
            
        // Inicia o leitor de fato
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
