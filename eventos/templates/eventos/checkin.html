<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria - Check-in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Módulo de Portaria</span>
            <a href="{% url 'lista_eventos' %}" class="btn btn-outline-light btn-sm">Sair do Modo Portaria</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-start" role="alert">
                            <strong>{{ message }}</strong>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card shadow mt-4">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">Validação de Ingressos</h4>
                    </div>
                    <div class="card-body">
                        <p class="text-muted mb-4">Posicione o cursor no campo abaixo e utilize o leitor de QR Code.</p>
                        
                        <form method="POST" action="{% url 'validar_checkin' %}">
                            {% csrf_token %}
                            <div class="input-group mb-3 input-group-lg">
                                <input type="text" name="ticket_hash" class="form-control text-center" placeholder="Aguardando leitura do QR Code..." autofocus required autocomplete="off">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg d-none">Processar (Oculto)</button>
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
